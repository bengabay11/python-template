line-length = 100

[lint]
select = [
    'F',      # pyflakes
    'E',      # pycodestyle (check Python code against some of the style conventions in PEP 8)
    'W',      # pycodestyle warnings (PEP 8)
    'A',      # flake8-builtins (prevent using keywords that clobber python builtins)
    'I',      # isort (sort imports alphabetically and automatically separate into sections and by type)
    'UP',     # pyupgrade (upgrade syntax for newer versions of the language)
    'ERA',    # eradicate (removes commented-out code)
    'TRY',    # TRY (prevent exception handling anti-patterns)
    'D',      # pydocstyle (checking compliance with Python docstring conventions)
    'RUF',    # the ruff developer's own rules
    'SIM',    # flake8-simplify
    'ARG',    # flake8-arguments (checks for unused function arguments)
    'PT',     # flake8-pytest-style (checking common style issues or inconsistencies with pytest-based tests)
    'C4',     # flake8-comprehensions (helps write better list/set/dict comprehensions)
    'B',      # flake8-bugbear (find likely bugs and design problems)
    'EM',     # flake8-errmsg (helps format nice error messages)
    'LOG',    # flake8-logging (checks for issues using the standard library logging module)
    'PIE',    # flake8-pie (implements misc. lints)
    'Q',      # flake8-quotes (checks for consistent use of quotes)
    'RSE',    # flake8-raise (finds improvements for raise statements)
    'N',      # flake8-naming (enforce naming conventions)
    'ASYNC',  # flake8-async (essential for AI SDKs/FastAPI)
    'DTZ',    # flake8-datetimez (prevents timezone-naive datetimes)
    'ISC',    # flake8-implicit-str-concat (catches "hello" "world" mistakes)
    'G',      # flake8-logging-format (prevents expensive string formatting in logs)
    'RET',    # flake8-return (checks return statements)
    'TCH',    # flake8-type-checking (manages type-only imports)
    'C90',    # mccabe (complexity checker)
    'COM',    # flake8-commas (enforces trailing commas)
    'SLOT',   # flake8-slots (optimizes class memory)
    'FLY',    # flynt (converts to f-strings)
    'ICN',    # flake8-import-conventions (standardizes aliases)
    'FA',     # flake8-future-annotations (ensures 'from __future__ import annotations')
    'TID',    # flake8-tidy-imports (bans relative imports / specific modules)
    'T10',    # flake8-debugger (prevents 'breakpoint()' from being committed)
    'INP',    # flake8-no-pep420 (enforces __init__.py in packages)
    'PYI',    # flake8-pyi (linting for type stubs)
    'PERF',   # perflint (performance optimization)
    'FBT',    # flake8-boolean-trap (readable function calls)
    'PL',     # pylint (comprehensive Python linting)
    'FURB',   # refurb (modernization suggestions)
    'PTH',    # flake8-use-pathlib (prefer pathlib over os.path)
    'BLE',    # flake8-blind-except (prevents bare except statements)
    'PGH',    # pygrep-hooks (miscellaneous lints using regex)
    'SLF',    # flake8-self (prevents private member access)
    'EXE',    # flake8-executable (checks executable file permissions)
    # 'ANN',    # flake8-annotations (enforces type hints)
    # 'S',      # flake8-bandit (security checks: finds hardcoded passwords, unsafe eval, etc.)
    'T20',    # flake8-print (forbids print statements in production)
]
ignore = [
    'D1',     # pydocstyle: missing docstrings
    'COM812', # Trailing comma missing (conflicts with formatter)
    'COM819', # Trailing comma prohibited (conflicts with formatter)
]

[lint.per-file-ignores]
'tests/**/*.py' = ['S101']

[lint.pydocstyle]
convention = 'google'
